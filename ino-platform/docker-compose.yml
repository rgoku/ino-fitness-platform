# ════════════════════════════════════════════════════════════════
# INÖ PLATFORM — LOCAL DEVELOPMENT
# docker compose up -d
# ════════════════════════════════════════════════════════════════

services:
  # ── Database ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ino
      POSTGRES_USER: ino
      POSTGRES_PASSWORD: ino
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ino"]
      interval: 5s
      retries: 5

  # ── Cache / Queue ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── Object Storage (S3-compatible) ───────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # ── API ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ino:ino@postgres:5432/ino
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
  miniodata:
