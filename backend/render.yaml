services:
  - type: web
    name: ino-fitness-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false   # set manually — use Render Postgres internal URL
      - key: SECRET_KEY
        generateValue: true
      - key: PUBLIC_BASE_URL
        sync: false   # set to https://<your-service>.onrender.com
      - key: CORS_ORIGINS
        sync: false   # set to: https://your-domain.com,exp://192.168.x.x:8081
      - key: JWT_ACCESS_EXPIRE_MINUTES
        value: "60"
      - key: JWT_REFRESH_EXPIRE_DAYS
        value: "14"
      - key: REDIS_URL
        value: ""     # leave empty — rate limiting fails-open without Redis
      - key: PYTHONUNBUFFERED
        value: "1"

databases:
  - name: ino-fitness-db
    plan: free
    region: oregon
    databaseName: ino_fitness
    user: ino
