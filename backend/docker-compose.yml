# Production-ready Docker Compose for INÖ Fitness backend
# Run from backend/: docker-compose up -d
# Migrations: docker-compose run --rm backend alembic upgrade head

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ino-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ino}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ino_secret_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-ino_fitness}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ino} -d ${POSTGRES_DB:-ino_fitness}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ino-net

  # ---------------------------------------------------------------------------
  # Redis (broker + rate limit + cache)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ino-redis
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - ino-net

  # ---------------------------------------------------------------------------
  # FastAPI backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ino-fitness-backend:latest
    container_name: ino-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ino}:${POSTGRES_PASSWORD:-ino_secret_change_me}@postgres:5432/${POSTGRES_DB:-ino_fitness}
      REDIS_URL: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0
      CELERY_BROKER_URL: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0
      CELERY_RESULT_BACKEND: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0
      DEBUG: "false"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ino-net

  # ---------------------------------------------------------------------------
  # Celery worker (reminders + future tasks)
  # ---------------------------------------------------------------------------
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: ino-fitness-backend:latest
    container_name: ino-celery-worker
    restart: unless-stopped
    command: celery -A app.infrastructure.celery_app worker -l info -Q reminders,default
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ino}:${POSTGRES_PASSWORD:-ino_secret_change_me}@postgres:5432/${POSTGRES_DB:-ino_fitness}
      REDIS_URL: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0
      CELERY_BROKER_URL: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0
      CELERY_RESULT_BACKEND: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.infrastructure.celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ino-net

  # ---------------------------------------------------------------------------
  # Celery beat (scheduler for reminder task)
  # ---------------------------------------------------------------------------
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    image: ino-fitness-backend:latest
    container_name: ino-celery-beat
    restart: unless-stopped
    command: celery -A app.infrastructure.celery_app beat -l info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ino}:${POSTGRES_PASSWORD:-ino_secret_change_me}@postgres:5432/${POSTGRES_DB:-ino_fitness}
      REDIS_URL: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0
      CELERY_BROKER_URL: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0
      CELERY_RESULT_BACKEND: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0
      DEBUG: "false"
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_healthy
    networks:
      - ino-net

volumes:
  postgres_data:
  redis_data:

networks:
  ino-net:
    driver: bridge
