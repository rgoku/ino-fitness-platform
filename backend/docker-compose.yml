version: '3.9'

services:
  api:
    build: .
    ports:
      - "8095:8000"
    environment:
      - DATABASE_URL=postgresql://ino:inopass@db:5432/ino
      - REDIS_URL=redis://redis:6379/0
      - PORT=8000
    env_file: .env
    depends_on:
      - db
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - DATABASE_URL=postgresql://ino:inopass@db:5432/ino
      - REDIS_URL=redis://redis:6379/0
    env_file: .env
    depends_on:
      - db
      - redis

  beat:
    build:
      context: .
      dockerfile: Dockerfile.beat
    environment:
      - DATABASE_URL=postgresql://ino:inopass@db:5432/ino
      - REDIS_URL=redis://redis:6379/0
    env_file: .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=ino
      - POSTGRES_PASSWORD=inopass
      - POSTGRES_DB=ino
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
