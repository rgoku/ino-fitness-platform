server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.ino.fit;

    # TLS
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Hide server info
    server_tokens off;
    more_clear_headers Server X-Powered-By;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=ai:10m rate=2r/m;

    # Body size limits
    client_max_body_size 50M;
    client_body_timeout 30s;
    client_header_timeout 10s;

    # Auth endpoints — strict rate limit
    location /api/v1/auth/ {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/proxy.conf;
    }

    # AI endpoints — rate limited
    location /api/v1/ai/ {
        limit_req zone=ai burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/proxy.conf;
    }

    # Webhook — no rate limit but verify signature in app
    location /api/v1/subscriptions/webhook {
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/proxy.conf;
    }

    # All other API routes
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/proxy.conf;
    }

    # Health check — no rate limit
    location /health {
        proxy_pass http://127.0.0.1:8000;
    }

    # Block common attack paths
    location ~ /\. { deny all; }
    location ~ ~$ { deny all; }
    location ~* \.(sql|bak|log|ini|conf|env)$ { deny all; }
}
